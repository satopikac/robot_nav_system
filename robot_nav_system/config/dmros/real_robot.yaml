# DMROS ROS topic configuration for real robot deployment
# Adjust topic names to match your robot platform

ros_topics:
  rgb_image: "/camera/color/image_raw"
  depth_image: "/camera/aligned_depth_to_color/image_raw"
  camera_info: "/camera/color/camera_info"
  odom: "/odom"

output:
  map_save_path: "output/map"
  semantic_save_path: "output/semantic"
  save_interval: 5.0

detection:
  model: "yolov8"
  confidence_threshold: 0.5
  device: "cuda:0"
